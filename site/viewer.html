<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CDR Replay — viewer</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="hdr"></div>
<main class="wrap">
  <div id="crumbs" class="crumbs"></div>
  <div class="viewer">
    <div>
      <div class="player-box"><div id="player"></div></div>
    </div>
    <div>
      <div class="panel-h"><h3>Matchs</h3><span class="count" id="count"></span></div>
      <div id="list" class="match-list"></div>
    </div>
  </div>
</main>
<footer>cocobot/cdr-replay</footer>

<script src="assets/app.js"></script>
<script>
document.getElementById("hdr").innerHTML = header();
const slug = qs("s");
let player = null, matches = [], curIdx = -1;

fetchJSON(`data/series/${slug}.json`).then(async (d) => {
  matches = d.matches;
  document.getElementById("crumbs").innerHTML =
    `<a href="index.html">Accueil</a><span class="sep">›</span>${d.category} · ${d.year}<span class="sep">›</span><b>${seriesLabel(d.series)}</b>`;
  document.getElementById("count").textContent = `${matches.length} matchs`;
  renderList();
  const start = qs("t") ? Number(qs("t")) : (matches[0] ? matches[0].t_start : 0);
  player = await loadYouTube("player", d.video_id, start);
  setInterval(tick, 500);
}).catch(() => {
  document.getElementById("list").innerHTML = `<div class="empty">Série introuvable.</div>`;
});

function teamSpan(name, color) {
  return `<span class="tname ${color === 'yellow' ? 'y' : 'b'}">${name || "?"}</span>`;
}
function renderList() {
  document.getElementById("list").innerHTML = matches.map((m, i) => `
    <div class="match" data-i="${i}">
      <div class="teams">${teamSpan(m.team_yellow, "yellow")} <span class="vs">vs</span> ${teamSpan(m.team_blue, "blue")}</div>
      <div class="meta"><span class="pill">Table ${m.table || "?"}</span><span>⏱ ${fmt(m.t_start)}</span></div>
    </div>`).join("") || `<div class="empty">Aucun match détecté.</div>`;
  document.querySelectorAll(".match").forEach((el) =>
    el.onclick = () => { const m = matches[el.dataset.i]; player.seekTo(m.t_start, true); player.playVideo(); });
}
function tick() {
  if (!player || !player.getCurrentTime) return;
  const t = player.getCurrentTime();
  let idx = matches.findIndex((m) => t >= m.t_start && t <= m.t_end);
  if (idx !== curIdx) {
    curIdx = idx;
    document.querySelectorAll(".match").forEach((el, i) => el.classList.toggle("now", i === idx));
    if (idx >= 0) document.querySelectorAll(".match")[idx].scrollIntoView({ block: "nearest", behavior: "smooth" });
  }
}
</script>
</body>
</html>
