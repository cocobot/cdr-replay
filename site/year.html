<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CDR · Replay</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Caveat:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
  <div id="hdr"></div>
  <main style="flex:1">
    <div class="container page">
      <a class="back" href="index.html">← Accueil</a>
      <h1 class="page__title page__title--marked" id="title">Édition</h1>
      <p class="page__sub" id="sub"></p>
      <div class="block">
        <h2 class="block__title">Séries</h2>
        <div class="series-grid" id="grid"></div>
      </div>
      <div class="block">
        <h2 class="block__title" id="teamsTitle">Toutes les équipes</h2>
        <div class="team-list" id="teamlist"></div>
      </div>
    </div>
  </main>
</div>

<script src="assets/app.js"></script>
<script>
mountHeader();
const year = qs("y");
const cat = (qs("c") || CAT);
document.getElementById("title").textContent = `${catLabel(cat)} ${year}`;

(async () => {
  const [d, teams] = await Promise.all([fetchJSON("data/index.json"), fetchJSON("data/teams.json")]);
  const series = (d.tree[cat] || {})[year] || {};
  const reg = Object.keys(series).filter((s) => !isFinale(s)).sort();
  const fin = Object.keys(series).filter(isFinale);
  let html = reg.map((s) =>
    `<a class="series-link" href="series.html?s=${slugOf(cat, year, s)}">
       <div class="series-link__name">Série ${s}</div>
       <div class="series-link__count">${series[s]} matches</div>
     </a>`).join("");
  html += fin.map((s) =>
    `<a class="series-link series-link--finale" href="series.html?s=${slugOf(cat, year, s)}">
       <div class="series-link__name">Phase finale</div>
       <div class="series-link__count">${series[s]} matches · 1/8 → finale</div>
     </a>`).join("");
  document.getElementById("grid").innerHTML = html || `<div class="empty">Aucune série</div>`;

  // Teams that played in this (cat, year), enriched with legend/rank from standings
  const standings = await loadStandings(cat, year);
  const namesInYearCat = new Set();
  for (const [name, apps] of Object.entries(teams)) {
    if (apps.some((a) => a.year === parseInt(year, 10) && a.category === cat)) namesInYearCat.add(name);
  }
  // Also include sheet teams that the video didn't see
  if (standings) for (const t of Object.values(standings)) namesInYearCat.add(t.name);

  const all = [...namesInYearCat].map((name) => {
    const k = teamKey(name);
    const st = standings && standings[k];
    const tmeta = d.teams.find((x) => teamKey(x.name) === k);
    return {
      name,
      city: tmeta ? tmeta.city : null,
      us: tmeta ? tmeta.us : isUs(name),
      cat,
      rank: st && st.rank,
      legend: st && st.type === "legends",
    };
  }).sort((a, b) => {
    if (a.rank && b.rank) return a.rank - b.rank;
    if (a.rank) return -1;
    if (b.rank) return 1;
    return a.name.localeCompare(b.name);
  });

  const nMatches = Object.values(series).reduce((s, n) => s + n, 0);
  document.getElementById("sub").textContent = `${all.length} équipes · ${nMatches} matches`;
  document.getElementById("teamsTitle").textContent = `Toutes les équipes — ${catLabel(cat)} ${year}`;
  document.getElementById("teamlist").innerHTML = all.map(teamLinkHTML).join("");
})();
</script>
</body>
</html>
