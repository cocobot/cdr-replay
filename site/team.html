<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CDR · Replay</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Caveat:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
  <div id="hdr"></div>
  <main style="flex:1">
    <div class="container page" id="page"></div>
  </main>
</div>

<script src="assets/app.js"></script>
<script>
mountHeader();
const team = qs("team");
const mode = (arr) => { const c = {}; let best = null, bn = 0; arr.forEach((x) => { if (!x) return; c[x] = (c[x] || 0) + 1; if (c[x] > bn) { bn = c[x]; best = x; } }); return best; };

fetchJSON("data/teams.json").then((teams) => {
  const apps = teams[team] || [];
  document.title = `CDR · ${team}`;
  if (!apps.length) {
    document.getElementById("page").innerHTML = `<a class="back" href="index.html">← Accueil</a><h1 class="page__title">Équipe introuvable</h1>`;
    return;
  }
  const us = isUs(team);
  const cat = mode(apps.map((a) => a.category)) || "senior";
  const city = mode(apps.map((a) => a.city));
  const country = mode(apps.map((a) => a.country));
  const loc = [city, country].filter(Boolean).join(", ");
  const years = [...new Set(apps.map((a) => a.year))].sort((a, b) => b - a);

  let html = `
    <a class="back" href="index.html">← Accueil</a>
    <h1 class="page__title page__title--marked">${esc(team)}${us ? '<span class="is-us-badge">c&rsquo;est nous</span>' : ""}</h1>
    <p class="page__sub">${loc ? esc(loc) + " " : ""}<span class="cat-pill cat-pill--${cat}">${catLabel(cat)}</span></p>
    <div class="team-stats">
      <span><strong>${apps.length}</strong> matches</span>
      <span><strong>${years.length}</strong> édition${years.length > 1 ? "s" : ""}</span>
    </div>`;

  for (const y of years) {
    const rows = apps.filter((a) => a.year === y).map((a) => {
      const no = isFinale(a.series) ? "F" : "S" + a.series;
      return `<a class="match-row" href="match.html?s=${a.slug}&i=${a.mi}">
        <span class="match-row__no">${no}</span>
        <span class="match-row__teams">${teamSpan(team)}<span class="vs">vs</span><span class="loser">${esc(a.opponent || "?")}</span>
          <span class="year-tag">${a.category === "junior" ? "JR" : "SR"}</span></span>
        <span class="match-row__score">Table ${esc(a.table || "?")}</span>
        <span class="match-row__dur">${fmt(a.t_start)}</span>
      </a>`;
    }).join("");
    html += `<div class="year-section"><div class="year-section__year">${y}</div><div class="match-list">${rows}</div></div>`;
  }
  document.getElementById("page").innerHTML = html;
}).catch(() => {
  document.getElementById("page").innerHTML = `<a class="back" href="index.html">← Accueil</a><h1 class="page__title">Erreur</h1>`;
});
</script>
</body>
</html>
