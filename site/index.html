<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CDR · Replay — Coupe de France de Robotique</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Caveat:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
  <div id="hdr"></div>
  <main style="flex:1">
    <div class="container page">
      <h1 class="page__title page__title--marked">Salut. Les matches sont là.</h1>
      <p class="page__sub">Tape une équipe, choisis une année, regarde. Voilà.</p>

      <div class="block">
        <h2 class="block__title">Année</h2>
        <div class="year-row" id="years"></div>
      </div>

      <div class="block">
        <h2 class="block__title">Équipes</h2>
        <div class="inline-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="color:var(--ink)"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input id="q" type="text" placeholder="Cocotter, ARIG, Les Karibelles…" autocomplete="off">
          <span class="inline-search__count" id="count"></span>
        </div>
        <div class="team-list" id="teamlist"></div>
        <p id="more" style="margin-top:12px;font-family:var(--mono);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em"></p>
      </div>
    </div>
  </main>
</div>

<script src="assets/app.js"></script>
<script>
mountHeader();
let TEAMS = [];

fetchJSON("data/index.json").then((d) => {
  // Year buttons (union across categories, newest first)
  const years = [...new Set(Object.values(d.tree).flatMap((yr) => Object.keys(yr)))].sort().reverse();
  document.getElementById("years").innerHTML = years.map((y, i) =>
    `<a class="year-btn${i === 0 ? " is-current" : ""}" href="year.html?y=${y}">${y}</a>`).join("");

  TEAMS = d.teams;
  const input = document.getElementById("q");
  const q0 = qs("q");
  if (q0) input.value = q0;
  render();
  input.addEventListener("input", render);
});

function render() {
  const q = document.getElementById("q").value.trim().toLowerCase();
  const filtered = q
    ? TEAMS.filter((t) => t.name.toLowerCase().includes(q) || (t.city || "").toLowerCase().includes(q))
    : TEAMS;
  const visible = filtered.slice(0, q ? 60 : 24);
  document.getElementById("count").textContent = `${filtered.length} équipes`;
  document.getElementById("teamlist").innerHTML = visible.map(teamLinkHTML).join("")
    || `<div style="padding:14px;font-family:var(--hand);font-size:18px;color:var(--muted)">Rien trouvé. Try again ?</div>`;
  const more = document.getElementById("more");
  more.textContent = (!q && filtered.length > visible.length)
    ? `+ ${filtered.length - visible.length} autres équipes — tape pour chercher` : "";
}
</script>
</body>
</html>
